[build]
  command = "npm run build"
  publish = "dist"

# Redirect API requests to the deployed Firebase Function or Render Backend.
[[redirects]]
  from = "/api/*"
  to = "https://clusterai-smart-gpu-scheduler.onrender.com/api/:splat"
  status = 200
  force = true

# Fallback for SPA routing - redirects all other requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
